<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Monitoring Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
        }

        body {
            background-color: var(--bg-dark);
            color: #f1f5f9;
            font-family: 'Quicksand', 'Prompt', sans-serif;
            margin: 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        iframe {
            width: 100%;
            height: calc(100vh - 80px);
            border: none;
        }

        .hidden { display: none; }
    </style>
</head>

<body>

<nav class="px-6 py-4 glass-card mb-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="font-bold text-lg">KPI Dashboard</h1>
    </div>
</nav>

<main id="mainPage" class="max-w-7xl mx-auto px-6 pb-12">

<div class="grid grid-cols-1 md:grid-cols-3 gap-8">

    <!-- Dozer -->
    <div onclick="showPage('dozer')" class="glass-card rounded-3xl p-8 text-center cursor-pointer">
        <h3 class="text-xl font-bold mb-2">KPI Dozer</h3>
        <span id="dozer-target">-</span>
        <span id="dozer-status">-</span>
    </div>

    <!-- Plough -->
    <div onclick="showPage('plough')" class="glass-card rounded-3xl p-8 text-center cursor-pointer">

        <!-- 🔥 รูปเปลี่ยนตาม KPI -->
        <div class="floating mb-6 flex justify-center">
            <img id="plough-img"
                 src="pass_plough.png"
                 class="w-[200px] h-[200px] object-contain drop-shadow-xl">
        </div>

        <h3 class="text-xl font-bold mb-2">KPI Plough</h3>

        <div class="flex justify-around">
            <div>
                <span>Target</span><br>
                <span id="plough-target">-</span>
            </div>

            <div>
                <span>Today</span><br>
                <span id="plough-focus">-</span>
            </div>
        </div>
    </div>

    <!-- Screw -->
    <div onclick="showPage('screw')" class="glass-card rounded-3xl p-8 text-center cursor-pointer">
        <h3 class="text-xl font-bold mb-2">KPI Screw</h3>
        <span id="screw-daily">-</span>
        <span id="screw-unit">-</span>
    </div>

</div>

</main>

<div id="detailPage" class="hidden">
    <iframe id="kpiFrame"></iframe>
</div>

<script>
lucide.createIcons();

async function loadHtmlEmbeddedJson(fileName) {
    const res = await fetch(fileName);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, "text/html");
    const jsonScript = doc.querySelector("#page-kpi-data");
    return jsonScript ? JSON.parse(jsonScript.textContent.trim()) : null;
}

async function loadPloughData() {

    const jsonData = await loadHtmlEmbeddedJson("KPI_Plough.html");

    document.getElementById("plough-target").textContent = jsonData?.target ?? "-";
    document.getElementById("plough-focus").textContent = jsonData?.focus ?? "-";

    // 🔥 logic เปลี่ยนรูป
    const today = parseFloat(jsonData?.focus || 0);
    const target = parseFloat(String(jsonData?.target || "0").replace('%',''));

    const img = document.getElementById("plough-img");

    if (today >= target) {
        img.src = "pass_plough.png";
    } else {
        img.src = "fail_plough.png";
    }
}

function showPage(pageId) {
    const mainPage = document.getElementById("mainPage");
    const detailPage = document.getElementById("detailPage");
    const frame = document.getElementById("kpiFrame");

    mainPage.classList.add("hidden");
    detailPage.classList.remove("hidden");

    if (pageId === "plough") frame.src = "KPI_Plough.html";
    if (pageId === "dozer") frame.src = "KPI_Dozer.html";
    if (pageId === "screw") frame.src = "KPI_Screw.html";
}

loadPloughData();
</script>

</body>
</html>

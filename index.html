<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Monitoring Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --pastel-pink: #ffb7c5;
            --pastel-blue: #a5d8ff;
            --pastel-purple: #d0bfff;
            --pastel-green: #b2f2bb;
        }

        body {
            background-color: var(--bg-dark);
            color: #f1f5f9;
            font-family: 'Quicksand', 'Prompt', sans-serif;
            margin: 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        iframe {
            width: 100%;
            height: calc(100vh - 80px);
            border: none;
            border-radius: 1rem;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav class="sticky top-0 z-50 px-6 py-4 glass-card mb-6">
    <div class="flex justify-between items-center">
        <div onclick="showPage('main')" class="cursor-pointer flex gap-3 items-center">
            <div class="w-10 h-10 bg-indigo-400 rounded-xl"></div>
            <div>
                <h1 class="font-bold">KPI Dashboard</h1>
                <p class="text-xs text-slate-400">Production Monitoring</p>
            </div>
        </div>

        <button id="backButton" onclick="showPage('main')" class="hidden">← กลับ</button>
    </div>
</nav>

<main id="mainPage" class="px-6">
    <div class="grid md:grid-cols-3 gap-6">

        <!-- DOZER -->
        <div onclick="showPage('dozer')" class="glass-card p-6 cursor-pointer text-center">
            <h3>KPI Dozer</h3>
            <div class="mt-4">
                <div>Target</div>
                <div id="dozer-target">-</div>
            </div>
            <div class="mt-2">
                <div>Status</div>
                <div id="dozer-status">-</div>
            </div>
        </div>

        <!-- PLOUGH -->
        <div onclick="showPage('plough')" class="glass-card p-6 cursor-pointer text-center">
            <h3>KPI Plough</h3>
            <div class="mt-4">
                <div>Target</div>
                <div id="plough-target">-</div>
            </div>
            <div class="mt-2">
                <div>Focus</div>
                <div id="plough-focus">-</div>
            </div>
        </div>

        <!-- SCREW -->
        <div onclick="showPage('screw')" class="glass-card p-6 cursor-pointer text-center">
            <h3>KPI Screw</h3>
            <div class="mt-4">
                <div>Daily</div>
                <div id="screw-daily">-</div>
            </div>
            <div class="mt-2">
                <div>Unit</div>
                <div id="screw-unit">-</div>
            </div>
        </div>

    </div>
</main>

<div id="detailPage" class="hidden">
    <iframe id="kpiFrame"></iframe>
</div>

<script>
lucide.createIcons();

const CONFIG = {
    dozer: {
        api: "https://script.google.com/macros/s/AKfycbw3OPytEZL3Cf6Kh6whxXoA0SIAZLFmeiTfV7nyveB1nCYjryCyIz4jv_-Xr-Uq4hgm/exec",
        target: "90%"
    },
    plough: {
        api: "https://script.google.com/macros/s/AKfycbw4AN-QcUUt1vgTTuQArvShGjujdHMlafw1I5DCMs6BfLOJY6Yd-AL3_SMEYNyiUxl_og/exec",
        target: "0.063"
    },
    screw: {
        api: "https://script.google.com/macros/s/AKfycbya9u9yt0H0XljaLMhasjykxtEYuwLcfAE6UJv83NTB8A8tIsYPO10kT8qJT4YqZ3Sd/exec"
    }
};

async function loadDozer(){
    const res = await fetch(CONFIG.dozer.api);
    const json = await res.json();
    const rows = json.data;
    const latest = rows[rows.length-1][8];
    document.getElementById("dozer-target").innerText = CONFIG.dozer.target;
    document.getElementById("dozer-status").innerText = latest + "%";
}

async function loadPlough(){
    const res = await fetch(CONFIG.plough.api);
    const json = await res.json();
    const rows = json.data;
    const latest = rows[rows.length-1][3];
    document.getElementById("plough-target").innerText = CONFIG.plough.target;
    document.getElementById("plough-focus").innerText = latest;
}

async function loadScrew(){
    const res = await fetch(CONFIG.screw.api);
    const json = await res.json();
    const rows = json.data;
    const latest = rows[rows.length-1][2];
    document.getElementById("screw-daily").innerText = latest;
    document.getElementById("screw-unit").innerText = "PTS";
}

function showPage(id){
    const main = document.getElementById("mainPage");
    const detail = document.getElementById("detailPage");
    const frame = document.getElementById("kpiFrame");
    const back = document.getElementById("backButton");

    if(id==="main"){
        main.classList.remove("hidden");
        detail.classList.add("hidden");
        back.classList.add("hidden");
    }else{
        main.classList.add("hidden");
        detail.classList.remove("hidden");
        back.classList.remove("hidden");

        frame.src = id==="dozer"?"KPI_Dozer.html":
                    id==="plough"?"KPI_Plough.html":
                    "KPI_Screw.html";
    }
}

loadDozer();
loadPlough();
loadScrew();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dozer Soft Minimal Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #111827;
            --card-bg: #1f2937;
            --soft-pink: #ff85a2;
            --soft-green: #2dd4bf;
            --accent-blue: #60a5fa;
        }
        body {
            background-color: var(--bg-main);
            color: #f3f4f6;
            font-family: 'Quicksand', 'Prompt', sans-serif;
            letter-spacing: 0.025em;
        }
        .cute-card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cute-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .kpi-value {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1;
        }
        .progress-container {
            height: 10px;
            background: #374151;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }
        .progress-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 1.5s ease-out;
        }
        .glass-header {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 0 0 30px 30px;
        }
        .standard-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-button {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: opacity 0.3s;
        }
        .table-row-cute {
            background: rgba(55, 65, 81, 0.4);
            border-radius: 16px;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }
        .table-row-cute:hover {
            transform: scale(1.005);
            background: rgba(55, 65, 81, 0.7);
        }
        .date-chip {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: #94a3b8;
        }
    </style>
</head>
<body class="pb-12">

    <!-- Navbar -->
    <nav class="glass-header sticky top-0 z-50 px-6 py-4 mb-8 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold">DOZER KPI TRACKER</h1>
                    <p class="text-xs text-slate-400 font-medium">Standard Monitoring System</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <input type="file" id="csvFileInput" accept=".csv" class="hidden">
                <button onclick="document.getElementById('csvFileInput').click()" class="custom-button text-white px-6 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    Import Production CSV
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        <!-- KPI Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div id="card-prod" class="cute-card p-8 border-t-4 border-slate-700">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Productivity</span>
                    <span class="standard-badge">STD: ≥ 95%</span>
                </div>
                <div class="kpi-value mb-2" id="val-prod">--%</div>
                <div class="progress-container">
                    <div id="bar-prod" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div id="card-mheff" class="cute-card p-8 border-t-4 border-slate-700">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">MH Efficiency</span>
                    <span class="standard-badge">STD: ≥ 95%</span>
                </div>
                <div class="kpi-value mb-2" id="val-mheff">--%</div>
                <div class="progress-container">
                    <div id="bar-mheff" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div id="card-overall" class="cute-card p-8 border-t-4 border-slate-700">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Overall Perf.</span>
                    <span class="standard-badge">STD: ≥ 90%</span>
                </div>
                <div class="kpi-value mb-2" id="val-overall">--%</div>
                <div class="progress-container">
                    <div id="bar-overall" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Charts Area -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="cute-card p-6">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h3 class="text-lg font-semibold flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-indigo-400"></span> Productivity Trend
                    </h3>
                </div>
                <div class="h-[320px]">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="cute-card p-6">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h3 class="text-lg font-semibold flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-teal-400"></span> Batch Quality Comparison
                    </h3>
                </div>
                <div class="h-[320px]">
                    <canvas id="compareChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Bottom Section -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-12">
                <div class="cute-card p-6">
                    <h3 class="text-lg font-semibold mb-6 flex items-center justify-between">
                        <span>Production Status Log</span>
                        <div class="flex items-center gap-4 text-[10px]">
                            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-teal-400"></span> Pass</span>
                            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-pink-400"></span> Fail</span>
                        </div>
                    </h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-slate-500 uppercase text-[10px] tracking-widest">
                                <tr>
                                    <th class="pb-4 px-4">Order ID</th>
                                    <th class="pb-4">ระยะเวลา (Start - End)</th>
                                    <th class="pb-4">Prod. (95%)</th>
                                    <th class="pb-4">MH (95%)</th>
                                    <th class="pb-4">Overall (90%)</th>
                                    <th class="pb-4 text-center">Outcome</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        Chart.register(ChartDataLabels);

        let charts = {};
        const COLORS = {
            pink: '#f472b6',
            green: '#2dd4bf',
            blue: '#60a5fa',
            slate: '#64748b',
            grid: 'rgba(255, 255, 255, 0.05)'
        };

        const STDS = { prod: 95, mh: 95, overall: 90 };

        const parseVal = (v) => {
            if (!v) return 0;
            return parseFloat(v.toString().replace(/[%, ]/g, '')) || 0;
        };

        document.getElementById('csvFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => processData(evt.target.result);
            reader.readAsText(file);
        });

        function processData(csv) {
            const lines = csv.split('\n');
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 11 || !cols[0].trim()) continue;
                data.push({
                    id: cols[0].trim(),
                    startDate: cols[2].trim(),
                    endDate: cols[3].trim(),
                    prod: parseVal(cols[8]),
                    mh_eff: parseVal(cols[9]),
                    overall: parseVal(cols[10])
                });
            }
            if (data.length) updateUI(data);
        }

        function updateUI(data) {
            const avg = {
                prod: (data.reduce((s, x) => s + x.prod, 0) / data.length).toFixed(1),
                mh: (data.reduce((s, x) => s + x.mh_eff, 0) / data.length).toFixed(1),
                overall: (data.reduce((s, x) => s + x.overall, 0) / data.length).toFixed(1)
            };

            updateCard('prod', avg.prod, STDS.prod);
            updateCard('mheff', avg.mh, STDS.mh);
            updateCard('overall', avg.overall, STDS.overall);

            renderTable(data);
            renderCharts(data);
        }

        function updateCard(type, val, target) {
            const el = document.getElementById(`val-${type}`);
            const bar = document.getElementById(`bar-${type}`);
            const card = document.getElementById(`card-${type}`);
            const isPass = parseFloat(val) >= target;
            const color = isPass ? COLORS.green : COLORS.pink;

            el.innerText = `${val}%`;
            el.style.color = color;
            bar.style.width = `${Math.min(val, 100)}%`;
            bar.style.backgroundColor = color;
            bar.style.boxShadow = `0 0 12px ${color}33`;
            card.style.borderColor = color;
        }

        function renderTable(data) {
            const container = document.getElementById('table-body');
            container.innerHTML = data.map(item => {
                const isPass = item.prod >= STDS.prod && item.mh_eff >= STDS.mh && item.overall >= STDS.overall;
                return `
                <tr class="table-row-cute">
                    <td class="py-4 px-4 font-bold text-slate-200">${item.id}</td>
                    <td class="py-4">
                        <div class="flex items-center gap-2">
                            <span class="date-chip">${item.startDate}</span>
                            <span class="text-slate-600">→</span>
                            <span class="date-chip">${item.endDate}</span>
                        </div>
                    </td>
                    <td class="${item.prod >= STDS.prod ? 'text-teal-400' : 'text-pink-400'} font-semibold">${item.prod}%</td>
                    <td class="${item.mh_eff >= STDS.mh ? 'text-teal-400' : 'text-pink-400'} font-semibold">${item.mh_eff}%</td>
                    <td class="${item.overall >= STDS.overall ? 'text-teal-400' : 'text-pink-400'} font-bold">${item.overall}%</td>
                    <td class="text-center">
                        <span class="text-[10px] uppercase font-bold px-3 py-1 rounded-full bg-opacity-10" style="background-color: ${isPass ? COLORS.green : COLORS.pink}; color:${isPass ? COLORS.green : COLORS.pink}">${isPass ? 'Pass' : 'Reject'}</span>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function renderCharts(data) {
            const labels = data.map(d => d.id.replace('DOZER_', ''));
            
            // Trend Chart
            if (charts.trend) charts.trend.destroy();
            charts.trend = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Productivity',
                        data: data.map(d => d.prod),
                        borderColor: COLORS.blue,
                        backgroundColor: COLORS.blue + '11',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 6,
                        pointBackgroundColor: COLORS.blue
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { right: 50 } }, // เผื่อที่ให้ Label เส้นมาตรฐาน
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            align: 'top',
                            color: COLORS.blue,
                            font: { weight: 'bold', size: 11 },
                            formatter: (v) => v + '%'
                        },
                        annotation: {
                            annotations: {
                                line1: {
                                    type: 'line',
                                    yMin: 95, yMax: 95,
                                    borderColor: 'rgba(244, 114, 182, 0.5)',
                                    borderWidth: 2, borderDash: [6, 6],
                                    label: {
                                        display: true,
                                        content: 'STD: 95%',
                                        position: 'end',
                                        backgroundColor: COLORS.pink,
                                        color: '#fff',
                                        font: { size: 10, weight: 'bold' },
                                        padding: 4
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        y: { min: 0, max: 120, grid: { color: COLORS.grid }, ticks: { color: COLORS.slate } },
                        x: { grid: { display: false }, ticks: { color: COLORS.slate } }
                    }
                }
            });

            // Overall Chart
            if (charts.compare) charts.compare.destroy();
            charts.compare = new Chart(document.getElementById('compareChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Overall Efficiency',
                        data: data.map(d => d.overall),
                        backgroundColor: data.map(d => d.overall >= 90 ? COLORS.green : COLORS.pink),
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { right: 50 } }, // เผื่อที่ให้ Label เส้นมาตรฐาน
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            color: (ctx) => ctx.dataset.data[ctx.dataIndex] >= 90 ? COLORS.green : COLORS.pink,
                            font: { weight: 'bold', size: 11 },
                            formatter: (v) => v + '%'
                        },
                        annotation: {
                            annotations: {
                                line1: {
                                    type: 'line',
                                    yMin: 90, yMax: 90,
                                    borderColor: 'rgba(255,255,255,0.3)',
                                    borderWidth: 2, borderDash: [4, 4],
                                    label: {
                                        display: true,
                                        content: 'STD: 90%',
                                        position: 'end',
                                        backgroundColor: '#475569',
                                        color: '#fff',
                                        font: { size: 10, weight: 'bold' },
                                        padding: 4
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        y: { min: 0, max: 115, grid: { color: COLORS.grid }, ticks: { color: COLORS.slate } },
                        x: { grid: { display: false }, ticks: { color: COLORS.slate } }
                    }
                }
            });
        }
    </script>
</body>
</html>
